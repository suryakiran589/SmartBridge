<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SignBridge — Sign Language to Speech</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
</head>
<body>

    <div class="app">

        <!-- Header -->
        <header class="header">
            <div class="logo">
                <div class="logo-dot"></div>
                SignBridge
            </div>
            <div class="header-right">
                <button class="mode-toggle" id="modeToggle" onclick="toggleMode()">
                    <span id="modeIcon">🤟</span>
                    <span id="modeText">Sign Language</span>
                </button>
                <div class="pill" id="statusPill">
                    <div class="pill-dot"></div>
                    <span id="statusText">LIVE</span>
                </div>
                <div class="pill">
                    CONF: <span id="confValue">—</span>
                </div>
            </div>
        </header>

        <!-- Main -->
        <main class="main">

            <!-- Left: video -->
            <div class="video-panel">
                <div class="video-wrapper">
                    <img id="videoFeed" src="{{ url_for('video_feed') }}" alt="Camera feed" />

                    <!-- Letter chips -->
                    <div class="letters-row" id="lettersRow"></div>

                    <!-- Gesture overlay -->
                    <div class="gesture-overlay">
                        <div class="gesture-label" id="gestureLabel">Waiting...</div>
                        <div class="gesture-sub" id="gestureAction">Show your hand to the camera</div>
                        <div class="conf-track">
                            <div class="conf-fill" id="confBar"></div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Right: controls -->
            <div class="right-panel">

                <!-- Sentence builder -->
                <div class="section">
                    <div class="section-label">Sentence Builder</div>
                    <div class="builder-body">
                        <div class="word-row">
                            <span class="mini-tag">Word</span>
                            <div class="word-display" id="wordDisplay">
                                <span class="cursor"></span>
                            </div>
                        </div>
                        <div class="sentence-display" id="sentenceDisplay">
                            Sentence will appear here...
                        </div>
                    </div>
                </div>

                <!-- Action buttons -->
                <div class="action-row">
                    <button class="btn btn-speak" onclick="speakNow()">▶ Speak</button>
                    <button class="btn btn-muted" onclick="deleteLetter()">⌫ Delete</button>
                    <button class="btn btn-muted btn-danger" onclick="clearAll()">✕ Clear</button>
                </div>

                <!-- Quick phrases -->
                <div class="section">
                    <div class="section-label">Quick Phrases</div>
                    <div class="quick-grid">
                        <button class="quick-btn" onclick="quickPhrase('Hello')">👋 Hello</button>
                        <button class="quick-btn" onclick="quickPhrase('Help me')">🆘 Help me</button>
                        <button class="quick-btn" onclick="quickPhrase('Thank you')">🙏 Thank you</button>
                        <button class="quick-btn" onclick="quickPhrase('Yes')">✓ Yes</button>
                        <button class="quick-btn" onclick="quickPhrase('No')">✕ No</button>
                        <button class="quick-btn" onclick="quickPhrase('I need water')">💧 Water</button>
                        <button class="quick-btn" onclick="quickPhrase('I am in pain')">⚠ Pain</button>
                        <button class="quick-btn" onclick="quickPhrase('Please wait')">⏳ Wait</button>
                    </div>
                </div>

                <!-- History -->
                <div class="section section-grow">
                    <div class="section-label">Sentence History</div>
                    <div class="history-list" id="historyList">
                        <div class="empty-msg" id="emptyMsg">No sentences yet</div>
                    </div>
                </div>

            </div>
        </main>
    </div>

    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
